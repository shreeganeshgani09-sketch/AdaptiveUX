<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI Extension</title>
    <style>
        /* Chrome limits popups to exactly 800x600 maximum */
        body, html {
            margin: 0;
            padding: 0;
            width: 800px;
            height: 600px;
            overflow: hidden;
            background: #0b0e14;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe src="index.html"></iframe>
</body>
</html>
